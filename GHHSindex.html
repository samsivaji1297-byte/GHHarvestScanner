<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GHHarvestScanner v1.3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background-color: #000;
      color: #dfe7f0;
      font-family: "IBM Plex Mono","JetBrains Mono",monospace;
    }

    #terminal-wrapper {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 16px;
    }

    /* Contained panel with refined industrial border */
    #terminal-container {
      background-color: #000;
      border: 2px solid #3a3f44;
      max-width: 960px;
      width: 100%;
      max-height: 85vh;
      padding: 0;
      position: relative;
      overflow: hidden;
    }

    /* Header bar */
    #terminal-header {
      width: 100%;
      padding: 10px 16px;
      background-color: #0a0d10;
      border-bottom: 2px solid #3a3f44;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      letter-spacing: 0.5px;
    }

    #terminal-header-title {
      color: #dfe7f0;
      font-weight: bold;
      text-transform: uppercase;
    }

    #terminal-header-datetime {
      color: #9aa5b1;
      font-size: 14px;
      font-family: "IBM Plex Mono","JetBrains Mono",monospace;
    }

    /* Terminal body */
    #terminal-body {
      padding: 20px 24px;
      position: relative;
    }

    /* Subtle scanlines */
    #terminal-body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(
        rgba(255,255,255,0.03) 1px, transparent 1px
      );
      background-size: 100% 3px;
      opacity: 0.15;
      pointer-events: none;
    }

    /* FIXED: true terminal behaviour */
    #terminal-output {
      white-space: pre;          /* no wrapping */
      overflow-x: auto;          /* horizontal scroll for long lines */
      overflow-y: auto;
      line-height: 1.45;
      font-size: 15px;
      padding-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    #terminal-input-line {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    #terminal-cursor {
      color: #dfe7f0;
      text-shadow: 0 0 6px rgba(78,163,255,0.8);
      margin-left: 2px;
    }
  </style>
</head>
<body>
  <div id="terminal-wrapper">
    <div id="terminal-container">

      <!-- Header Bar -->
      <div id="terminal-header">
        <div id="terminal-header-title">GitHub Harvest and Scanner</div>
        <div id="terminal-header-datetime"></div>
      </div>

      <!-- Terminal Body -->
      <div id="terminal-body">
        <pre id="terminal-output"></pre>
        <div id="terminal-input-line">
          <span>&gt;</span>
          <span id="terminal-input"></span>
          <span id="terminal-cursor">█</span>
        </div>
      </div>

    </div>
  </div>

  <script>
    let outputEl, inputEl, inputBuffer = "";

    /* FIXED: Live datetime stamp */
    function updateDateTime() {
      const now = new Date();

      const date = now.toLocaleDateString("en-AU", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      }).toUpperCase();

      const time = now.toLocaleTimeString("en-AU", {
        hour12: false
      });

      document.getElementById("terminal-header-datetime").textContent =
        `${date} • ${time}`;
    }

    const preIgnitionFrame = [
      "GHHarvestScanner v1.3",
      "────────────────────────────────────────────────────────────",
      "MODE: A — Fork Acquisition",
      "STATE: PRE-IGNITION",
      "RANGE: dormant GitHub repositories",
      "FILTERS: last_commit > 24mo | MIT/Apache | stars: 10–300",
      "",
      "STATUS: SYSTEM IDLE",
      "AWAITING COMMAND",
      "────────────────────────────────────────────────────────────",
      ""
    ].join("\n");

    function print(t="") {
      outputEl.textContent += t + "\n";
      outputEl.scrollTop = outputEl.scrollHeight;
    }

    function setFrame(t) {
      outputEl.textContent = t + "\n";
    }

    function handleCommand(cmdRaw) {
      const cmd = cmdRaw.trim().toUpperCase();
      if (!cmd) return;

      if (cmd === "HELP") {
        print("AVAILABLE COMMANDS:");
        print("  HELP   - list commands");
        print("  SCAN   - describe scan behavior (v1.0 placeholder)");
        print("  CLEAR  - clear terminal");
        return;
      }

      if (cmd === "CLEAR") {
        setFrame(preIgnitionFrame);
        return;
      }

      if (cmd === "SCAN") {
        print("SCAN: v1.0 placeholder.");
        print("      Future: GitHub API scan for dormant repos.");
        return;
      }

      print("UNKNOWN COMMAND: " + cmdRaw);
      print("TYPE 'HELP' FOR AVAILABLE COMMANDS.");
    }

    function renderInput() {
      inputEl.textContent = inputBuffer;
    }

    function onKeyDown(e) {
      if (e.key === "Backspace") {
        inputBuffer = inputBuffer.slice(0, -1);
        renderInput();
        e.preventDefault();
        return;
      }

      if (e.key === "Enter") {
        print("> " + inputBuffer);
        handleCommand(inputBuffer);
        inputBuffer = "";
        renderInput();
        e.preventDefault();
        return;
      }

      if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
        inputBuffer += e.key;
        renderInput();
        e.preventDefault();
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      outputEl = document.getElementById("terminal-output");
      inputEl = document.getElementById("terminal-input");

      updateDateTime();
      setInterval(updateDateTime, 1000);  // <-- LIVE CLOCK FIX

      setFrame(preIgnitionFrame);

      document.addEventListener("keydown", onKeyDown);
    });
  </script>
</body>
</html>
