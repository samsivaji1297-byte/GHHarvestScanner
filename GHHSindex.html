<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GHHarvestScanner v1.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background-color: #000;
      color: #dfe7f0;
      font-family: "IBM Plex Mono","JetBrains Mono",monospace;
    }
    #terminal-wrapper {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 16px;
    }
    #terminal-container {
      background: #000; border: 1px solid #2a2f33;
      max-width: 900px; width: 100%; max-height: 80vh;
      padding: 16px 20px; position: relative; overflow: hidden;
    }
    #terminal-container::before {
      content: ""; position: absolute; inset: 0;
      background-image: linear-gradient(
        rgba(255,255,255,0.03) 1px, transparent 1px
      );
      background-size: 100% 3px; opacity: 0.15; pointer-events: none;
    }
    #terminal-output {
      white-space: pre-wrap; line-height: 1.4; font-size: 14px;
      padding-bottom: 8px; position: relative; z-index: 1;
    }
    #terminal-input-line {
      display: flex; align-items: center; gap: 6px;
      position: relative; z-index: 1;
    }
    #terminal-cursor {
      color: #dfe7f0;
      text-shadow: 0 0 6px rgba(78,163,255,0.8);
    }
  </style>
</head>
<body>
  <div id="terminal-wrapper">
    <div id="terminal-container">
      <pre id="terminal-output"></pre>
      <div id="terminal-input-line">
        <span>&gt;</span>
        <span id="terminal-input"></span>
        <span id="terminal-cursor">█</span>
      </div>
    </div>
  </div>

  <script>
    let outputEl, inputEl, inputBuffer = "";

    const preIgnitionFrame = [
      "GHHarvestScanner v1.0",
      "────────────────────────────────────────────────────────────",
      "MODE: A — Fork Acquisition",
      "STATE: PRE-IGNITION",
      "RANGE: dormant GitHub repositories",
      "FILTERS: last_commit > 24mo | MIT/Apache | stars: 10–300",
      "",
      "STATUS: SYSTEM IDLE",
      "AWAITING COMMAND",
      "────────────────────────────────────────────────────────────",
      ""
    ].join("\\n");

    function print(t="") {
      outputEl.textContent += t + "\\n";
      outputEl.scrollTop = outputEl.scrollHeight;
    }

    function setFrame(t) {
      outputEl.textContent = t + "\\n";
    }

    function handleCommand(cmdRaw) {
      const cmd = cmdRaw.trim().toUpperCase();
      if (!cmd) return;

      if (cmd === "HELP") {
        print("AVAILABLE COMMANDS:");
        print("  HELP   - list commands");
        print("  SCAN   - describe scan behavior (v1.0 placeholder)");
        print("  CLEAR  - clear terminal");
        return;
      }

      if (cmd === "CLEAR") {
        setFrame(preIgnitionFrame);
        return;
      }

      if (cmd === "SCAN") {
        print("SCAN: v1.0 placeholder.");
        print("      Future: GitHub API scan for dormant repos.");
        return;
      }

      print("UNKNOWN COMMAND: " + cmdRaw);
      print("TYPE 'HELP' FOR AVAILABLE COMMANDS.");
    }

    function renderInput() {
      inputEl.textContent = inputBuffer;
    }

    function onKeyDown(e) {
      if (e.key === "Backspace") {
        inputBuffer = inputBuffer.slice(0, -1);
        renderInput();
        e.preventDefault();
        return;
      }

      if (e.key === "Enter") {
        print("> " + inputBuffer);
        handleCommand(inputBuffer);
        inputBuffer = "";
        renderInput();
        e.preventDefault();
        return;
      }

      if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
        inputBuffer += e.key;
        renderInput();
        e.preventDefault();
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      outputEl = document.getElementById("terminal-output");
      inputEl = document.getElementById("terminal-input");

      setFrame(preIgnitionFrame);
      document.addEventListener("keydown", onKeyDown);
    });
  </script>
</body>
</html>
